<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ParkLV.com | Live</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; }
        
        /* THE PICTURE IS THE ENTIRE PAGE */
        .hero-background {
            height: 100vh;
            width: 100vw;
            background: url('https://i.imgur.com/your_uploaded_image_id.png') no-repeat center center fixed; /* UPLOAD WOW_3.png AND REPLACE THIS URL */
            background-size: cover;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
        }

        /* FLOATING CONTROL PANEL */
        .ui-panel {
            background: rgba(18, 22, 43, 0.7);
            backdrop-filter: blur(15px);
            padding: 30px;
            border-radius: 20px;
            border: 1px solid rgba(0, 243, 255, 0.3);
            width: 90%;
            max-width: 400px;
            margin-bottom: 50px;
            color: white;
            text-align: center;
        }

        .btn-action {
            background: var(--vegas-gold, #ffd700);
            color: black;
            border: none;
            padding: 15px 30px;
            border-radius: 10px;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            margin-top: 15px;
        }
    </style>
</head>
<body>

    <div class="hero-background">
        <div class="ui-panel">
            <h3>Find Your Free Spot</h3>
            <input type="text" placeholder="Destination..." style="width:100%; padding: 10px; border-radius: 5px;">
            <button class="btn-action">Start Navigation</button>
        </div>
    </div>

</body>
</html>
