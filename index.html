<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Park Fast. Park Free. ParkLV</title>
    <!-- Leaflet Open-Source Mapping CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --bg-dark: #060814;
            /* Semi-transparent panel background for glassmorphism */
            --panel-bg: rgba(18, 22, 43, 0.6); 
            --neon-cyan: #00f3ff;
            --neon-magenta: #ff007f;
            --vegas-gold: #ffd700;
            --text-light: #ffffff;
            --text-muted: #8fa0dd;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            /* ─── BACKGROUND INTEGRATION ─── */
            /* This sets the Las Vegas skyline at dusk as the page background */
            background-image: 
                linear-gradient(to bottom, rgba(6, 8, 20, 0.3), rgba(6, 8, 20, 0.6)),
                url('https://images.unsplash.com/photo-1574077865666-61e72c82d212?q=80&w=2000');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed; /* Keeps background static */
            color: var(--text-light);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ─── HOLOGRAM CONTAINER (Main Page Layout) ─── */
        .main-hologram-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            /* Creates space below the floating arch header */
            margin-top: 180px; 
            padding: 0 20px 40px 20px;
            width: 100%;
            margin: 0 auto;
            gap: 25px;
        }

        /* ─── FLOATING ARCH HEADER (WOW_2.png Top Text) ─── */
        header {
            text-align: center;
            position: absolute;
            top: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            pointer-events: none; /* Allows clicking through the text */
        }

        .logo-title {
            font-size: 4rem;
            font-weight: 900;
            letter-spacing: -2px;
            text-transform: uppercase;
            background: linear-gradient(135deg, #fff 30%, var(--vegas-gold) 75%, var(--neon-cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            /* Strong glow effect */
            text-shadow: 0 0 20px rgba(0, 243, 255, 0.6), 0 0 40px rgba(255, 215, 0, 0.4);
        }

        /* ─── HOLOGRAM DASHBOARD (WOW_2.png Center Panel) ─── */
        .app-grid {
            display: grid;
            grid-template-columns: 1fr;
            width: 100%;
            gap: 25px;
            /* ─── GLASSMORPHISM STYLING ─── */
            background: var(--panel-bg);
            border-radius: 24px;
            border: 1px solid rgba(0, 243, 255, 0.3);
            backdrop-filter: blur(15px); /* Frosted glass effect */
            box-shadow: 0 15px 35px rgba(0,0,0,0.7), 0 0 50px rgba(0, 243, 255, 0.2);
            padding: 30px;
        }
        @media (min-width: 992px) {
            .app-grid { grid-template-columns: 1fr 380px; }
        }

        /* ─── GLOWING MAP COMPONENT ─── */
        .map-box {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 16px;
            border: 1px solid var(--neon-cyan);
            height: 500px;
            position: relative;
            overflow: hidden;
            box-shadow: inset 0 0 20px var(--neon-cyan);
        }
        #map { height: 100%; width: 100%; }

        /* ─── SIDE CONTROL PANEL ─── */
        .panel {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        /* Form Inputs Style Configuration */
        .input-group { margin-bottom: 16px; }
        .input-group label {
            display: block;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--neon-cyan);
            margin-bottom: 8px;
            text-shadow: 0 0 5px var(--neon-cyan);
        }
        .input-field {
            width: 100%;
            background: rgba(6, 8, 20, 0.4);
            border: 1px solid var(--neon-cyan);
            padding: 14px 16px;
            border-radius: 10px;
            color: white;
            font-size: 0.95rem;
            transition: all 0.2s ease;
        }
        .input-field:focus {
            outline: none;
            border-color: var(--vegas-gold);
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.3);
            background: rgba(6, 8, 20, 0.9);
        }

        /* Action Buttons */
        .btn-action {
            background: linear-gradient(135deg, var(--vegas-gold) 0%, #c39627 100%);
            color: #000;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-size: 1.05rem;
            font-weight: 800;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 10px;
        }
        .btn-action:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(255, 215, 0, 0.5);
            background: linear-gradient(135deg, #fff 0%, var(--vegas-gold) 100%);
        }

        /* Real-Time Log Layout Styles */
        .status-container { margin-top: 20px; }
        .status-title {
            font-size: 0.75rem;
            text-transform: uppercase;
            color: var(--text-muted);
            letter-spacing: 1.5px;
            margin-bottom: 8px;
            font-weight: 700;
        }
        #output-log {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 8px;
            padding: 12px;
            font-size: 0.85rem;
            border: 1px solid rgba(255,255,255,0.05);
            color: rgba(255,255,255,0.75);
            line-height: 1.4;
        }

        /* Option Recommendations Panel Cards */
        .status-card {
            background: rgba(255, 255, 255, 0.02);
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 8px;
            border: 1px solid rgba(255,255,255,0.03);
            border-left: 4px solid var(--neon-cyan);
            transition: transform 0.2s;
        }
        .status-card:hover { transform: translateX(3px); border-left-color: var(--vegas-gold); }
        .status-card.free { border-left-color: var(--vegas-gold); }
        .status-card h4 { font-size: 0.95rem; margin-bottom: 2px; font-weight: 600; color: #fff; }
        .status-card p { font-size: 0.85rem; color: var(--text-muted); }
        .status-card b { color: var(--neon-cyan); }

        /* Leaflet dark overrides for holographic theme */
        .leaflet-tile {
            filter: invert(1) hue-rotate(180deg) brightness(0.95) saturate(1.5);
        }
        .leaflet-container { background: transparent !important; }
        .leaflet-control-attribution { display: none !important; } /* Clean look */
        .leaflet-popup-content-wrapper { background: rgba(18, 22, 43, 0.9); color: #fff; border: 1px solid var(--neon-cyan); }
        .leaflet-popup-tip { background: rgba(18, 22, 43, 0.9); }
    </style>
</head>
<body>

    <!-- Floating Brand Headline (Styled like the arch text in WOW_2.png) -->
    <header>
        <h1 class="logo-title">Park Fast. Park Free. ParkLV</h1>
    </header>

    <!-- Main Augmented Reality Dashboard Container (Glassmorphic panel) -->
    <div class="main-hologram-container">
        <div class="app-grid">
            <!-- Map Canvas Window Framework -->
            <div class="map-box">
                <div id="map"></div>
            </div>

            <!-- Dashboard App Interaction Control Panel -->
            <div class="panel">
                <div>
                    <!-- Interactive Routing Fields -->
                    <div class="input-group">
                        <label for="start-loc">1. Your Location</label>
                        <input type="text" id="start-loc" class="input-field" placeholder="Detecting GPS..." />
                    </div>

                    <div class="input-group">
                        <label for="dest-loc">2. Destination</label>
                        <input type="text" id="dest-loc" class="input-field" placeholder="e.g., Bellagio, T-Mobile Arena" value="The Cosmopolitan of Las Vegas" />
                    </div>

                    <button class="btn-action" onclick="locateAndRoute()">Find Closest Free Spot</button>
                    
                    <div class="status-container">
                        <div class="status-title">Live Tracking Engine</div>
                        <div id="output-log">
                            Enter coordinates or click "Find Spot". No downloads required.
                        </div>
                    </div>
                </div>

                <div class="status-container" style="margin-top: 15px;">
                    <div class="status-title">Closest Free Options Found</div>
                    <div class="status-card free">
                        <h4>Fremont St. Smart Structure</h4>
                        <p>Distance: 0.2 mi | <b>Open Slots: 14</b></p>
                    </div>
                    <div class="status-card">
                        <h4>Arts District Open Lot</h4>
                        <p>Distance: 0.5 mi | <b>Open Slots: 8</b></p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- OpenStreetMap / Leaflet Map Engines Setup -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Initialize map centered on Las Vegas
        let map = L.map('map').setView([36.1147, -115.1728], 14);

        // Custom dark/inverted tile layer to match holographic aesthetic
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap contributors &copy; CARTO'
        }).addTo(map);

        // Mock data for parking spots
        const mockFreeParkingSpots = [
            { name: "The Cosmopolitan Free Structure Zone", lat: 36.1098, lng: -115.1740, slots: 11 },
            { name: "Bellagio Area Open Access Lot", lat: 36.1126, lng: -115.1765, slots: 6 },
            { name: "Fremont St. Smart Structure", lat: 36.1710, lng: -115.1410, slots: 14 }
        ];

        // Add markers for mock spots
        mockFreeParkingSpots.forEach(spot => {
            L.circleMarker([spot.lat, spot.lng], {
                color: '#ffd700', // Vegas Gold
                fillColor: '#ffd700',
                fillOpacity: 0.6,
                radius: 10
            }).addTo(map).bindPopup(`<b>${spot.name}</b><br>Available Free Spaces: ${spot.slots}`);
        });

        // Function to handle routing logic
        function locateAndRoute() {
            const logger = document.getElementById('output-log');
            const destVal = document.getElementById('dest-loc').value || "Destination";

            if (!navigator.geolocation) {
                logger.innerHTML = "❌ Geolocation parameters unsupported by this device browser.";
                return;
            }

            logger.innerHTML = `🔄 Calculating vectors to ${destVal}...`;

            navigator.geolocation.getCurrentPosition(
                (position) => {
                    const userLat = position.coords.latitude;
                    const userLng = position.coords.longitude;

                    // Recenter map on user
                    map.setView([userLat, userLng], 15);

                    // Add user location marker
                    L.marker([userLat, userLng]).addTo(map)
                        .bindPopup('<b>Your Location</b>').openPopup();

                    // Find closest spot
                    let closestSpot = mockFreeParkingSpots[0];
                    let minDistance = Infinity;

                    mockFreeParkingSpots.forEach(spot => {
                        let d = Math.sqrt(Math.pow(spot.lat - userLat, 2) + Math.pow(spot.lng - userLng, 2));
                        if (d < minDistance) {
                            minDistance = d;
                            closestSpot = spot;
                        }
                    });

                    logger.innerHTML = `⚡ <b>Fast Route Acquired!</b><br>Vectoring to: <b>${closestSpot.name}</b>`;
                    
                    // Add polyline
                    let polyline = L.polyline([
                        [userLat, userLng],
                        [closestSpot.lat, closestSpot.lng]
                    ], { color: '#00f3ff', weight: 4, dashArray: '6, 8' }).addTo(map);
                    
                    map.fitBounds(polyline.getBounds());
                },
                (error) => {
                    logger.innerHTML = `ℹ️ GPS permissions skipped. Tracking paths from Strip core towards <b>${destVal}</b> options natively instead.`;
                    map.setView([36.1147, -1
