<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Park Fast. Park Free. ParkLV</title>
    <!-- Leaflet Open-Source Mapping CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --bg-dark: #060814;
            /* Highly transparent background for glassmorphism */
            --panel-bg: rgba(18, 22, 43, 0.5); 
            --neon-cyan: #00f3ff;
            --neon-magenta: #ff007f;
            --vegas-gold: #ffd700;
            --text-light: #ffffff;
            --text-muted: #8fa0dd;
            --hologram-border: rgba(0, 243, 255, 0.4);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            /* ─── BACKGROUND INTEGRATION ─── */
            background-color: var(--bg-dark);
            /* Replace with the URL of the Las Vegas Skyline image from WOW.png */
            background-image: 
                linear-gradient(to bottom, rgba(6, 8, 20, 0.5), rgba(6, 8, 20, 0.8)),
                url('https://images.unsplash.com/photo-1574077865666-61e72c82d212?q=80&w=2000');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed; /* Keeps the background static while scrolling hologram */
            
            color: var(--text-light);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ─── MAIN HOLOGRAM CONTAINER ─── */
        /* This replaces the old grid and is styled to look like the central hologram panel */
        .main-hologram-panel {
            margin: 80px auto 40px auto; /* Top margin creates space for header */
            width: 90%;
            max-width: 1200px;
            background: var(--panel-bg);
            border-radius: 24px;
            border: 2px solid var(--hologram-border);
            backdrop-filter: blur(20px); /* Stronger blur for glass effect */
            box-shadow: 0 0 30px var(--neon-cyan), 0 0 60px rgba(0, 243, 255, 0.1);
            padding: 40px;
            display: flex;
            flex-direction: column;
            gap: 30px;
            position: relative;
            z-index: 10;
        }

        /* Hologram Scanlines Effect */
        .main-hologram-panel::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                0deg,
                rgba(0, 0, 0, 0.15),
                rgba(0, 0, 0, 0.15) 1px,
                transparent 1px,
                transparent 3px
            );
            pointer-events: none;
            border-radius: 24px;
            opacity: 0.5;
        }

        /* ─── HEADER (Now inside the hologram) ─── */
        header {
            text-align: center;
        }

        .logo-title {
            font-size: 3.5rem;
            font-weight: 900;
            letter-spacing: -1px;
            text-transform: uppercase;
            background: linear-gradient(135deg, #fff 40%, var(--vegas-gold) 70%, var(--neon-cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px var(--neon-cyan), 0 0 40px var(--vegas-gold);
            margin-bottom: 10px;
        }
        .header-sub {
            color: var(--text-muted);
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 600;
        }

        /* ─── HOLOGRAM INTERNAL LAYOUT (Map + Controls) ─── */
        .hologram-layout {
            display: grid;
            grid-template-columns: 1fr;
            gap: 30px;
        }
        @media (min-width: 992px) {
            .hologram-layout { grid-template-columns: 2fr 1fr; }
        }

        /* ─── GLOWING MAP COMPONENT ─── */
        .map-box {
            background: rgba(0,0,0,0.3);
            border-radius: 16px;
            border: 1px solid var(--neon-cyan);
            height: 400px; /* Fixed height for the map */
            position: relative;
            overflow: hidden;
            box-shadow: inset 0 0 20px var(--neon-cyan);
        }
        #map { height: 100%; width: 100%; }

        /* ─── SIDE CONTROL PANEL ─── */
        .control-panel {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            gap: 20px;
        }

        /* Form Inputs Style Configuration */
        .input-group { margin-bottom: 15px; }
        .input-group label {
            display: block;
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--neon-cyan);
            margin-bottom: 8px;
            text-shadow: 0 0 5px var(--neon-cyan);
        }
        .input-field {
            width: 100%;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid var(--neon-cyan);
            padding: 16px;
            border-radius: 10px;
            color: white;
            font-size: 1rem;
            transition: all 0.3s ease;
        }
        .input-field:focus {
            outline: none;
            box-shadow: 0 0 15px var(--neon-cyan);
            background: rgba(0, 0, 0, 0.8);
        }

        /* Action Buttons */
        .btn-action {
            background: linear-gradient(135deg, var(--vegas-gold) 0%, #c39627 100%);
            color: #000;
            border: none;
            padding: 18px;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 800;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .btn-action:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 0 25px var(--vegas-gold), 0 0 50px var(--neon-magenta);
            background: linear-gradient(135deg, #fff 0%, var(--vegas-gold) 100%);
        }

        /* Status Display Area */
        .status-area {
            margin-top: 15px;
        }
        .status-title {
            font-size: 0.8rem;
            text-transform: uppercase;
            color: var(--text-muted);
            letter-spacing: 1.5px;
            margin-bottom: 10px;
            font-weight: 700;
        }
        #output-log {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            padding: 15px;
            font-size: 0.9rem;
            border: 1px solid rgba(255,255,255,0.05);
            color: rgba(255,255,255,0.85);
            line-height: 1.6;
        }

        /* Option Recommendations Panel Cards (Refined for Hologram) */
        .status-card {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 10px;
            padding: 16px;
            margin-bottom: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-left: 4px solid var(--neon-cyan);
            transition: all 0.3s ease;
        }
        .status-card:hover {
            transform: translateX(5px);
            border-left-color: var(--vegas-gold);
            background: rgba(0, 243, 255, 0.1);
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.2);
        }
        .status-card.free { border-left-color: var(--vegas-gold); }
        .status-card h4 {
            font-size: 1rem;
            margin-bottom: 4px;
            font-weight: 600;
            color: #fff;
        }
        .status-card p {
            font-size: 0.9rem;
            color: var(--text-muted);
        }
        .status-card b { color: var(--neon-cyan); }

        /* Leaflet dark overrides for holographic theme */
        .leaflet-tile {
            filter: invert(1) hue-rotate(180deg) brightness(0.9) saturate(2);
        }
        .leaflet-container { background: transparent !important; }
        .leaflet-control-attribution { display: none !important; } /* Hide attribution for cleaner look */
        .leaflet-popup-content-wrapper { background: rgba(18, 22, 43, 0.9); color: #fff; border: 1px solid var(--neon-cyan); }
        .leaflet-popup-tip { background: rgba(18, 22, 43, 0.9); }
        .leaflet-popup-content b { color: var(--neon-cyan); }
    </style>
</head>
<body>

    <!-- The primary content is contained within a single, large holographic panel -->
    <div class="main-hologram-panel">
        <header>
            <h1 class="logo-title">Park Fast. Park Free. ParkLV</h1>
            <p class="header-sub">Augmented Reality Parking Engine</p>
        </header>

        <div class="hologram-layout">
            <!-- Map Canvas Window (Integrated) -->
            <div class="map-box">
                <div id="map"></div>
            </div>

            <!-- Dashboard Interaction Control Panel (Integrated) -->
            <div class="control-panel">
                <div>
                    <!-- Interactive Routing Fields -->
                    <div class="input-group">
                        <label for="start-loc">1. Your Location</label>
                        <input type="text" id="start-loc" class="input-field" placeholder="Detecting GPS..." />
                    </div>

                    </div>
                </div>

                <!-- Closest Options found (Integrated) -->
                <div class="status-area" style="margin-top: 15px;">
                    <div class="status-title">Closest Free Options Found</div>
                    <div class="status-card free">
                        <h4>Fremont St. Smart Structure</h4>
                        <p>Distance: 0.2 mi | <b>Open Slots: 14</b></p>
                    </div>
                    <div class="status-card">
                        <h4>Arts District Open Lot</h4>
                        <p>Distance: 0.5 mi | <b>Open Slots: 8</b></p>
                    </div>
                </div>
            </div>
        </div>
    </div>
