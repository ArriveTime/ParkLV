<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Park Fast. Park Free. Park LV.</title>
    <!-- Leaflet Open-Source Mapping CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --bg-gold: #ffd700;
            --text-blue: #0d47a1;
            --text-light: #ffffff;
            --map-bg-white: #ffffff;
            --border-color: #bbdefb;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }

        body {
            background-color: var(--bg-gold);
            background-image: 
                linear-gradient(to bottom, rgba(255, 215, 0, 0.8), rgba(255, 215, 0, 0.95)),
                url('https://images.unsplash.com/photo-1605035012319-110213f4525c?q=80&w=2000');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: var(--text-blue);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            text-align: center;
            padding: 30px 20px;
            border-bottom: 2px solid var(--border-color);
            background-color: rgba(255, 215, 0, 0.9);
        }

        .logo-title { font-size: 2.5rem; font-weight: 900; text-transform: uppercase; color: var(--text-blue); }
        
        .main-container {
            flex: 1;
            display: grid;
            grid-template-columns: 1fr;
            gap: 25px;
            padding: 25px;
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
        }

        @media (min-width: 992px) { .main-container { grid-template-columns: 1fr 380px; } }

        .btn-locate {
            background-color: var(--text-blue);
            color: var(--text-light);
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            align-self: flex-start;
        }

        .map-panel {
            background-color: var(--map-bg-white);
            border-radius: 16px;
            /* High contrast border to make the map pop */
            border: 4px solid var(--text-blue) !important;
            height: 500px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 8px 24px rgba(0,0,0,0.15);
        }
        #map { height: 100%; width: 100%; }

        .control-panel {
            background-color: var(--text-blue);
            color: var(--text-light);
            border-radius: 16px;
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .input-field {
            width: 100%;
            background-color: rgba(255, 255, 255, 0.95);
            padding: 16px;
            border-radius: 8px;
            border: none;
            margin-top: 5px;
        }

        .btn-action {
            background-color: var(--bg-gold);
            color: var(--text-blue);
            border: none;
            padding: 18px;
            border-radius: 8px;
            font-weight: 800;
            text-transform: uppercase;
            cursor: pointer;
        }

        .status-box { background-color: rgba(255, 255, 255, 0.1); padding: 15px; border-radius: 8px; }
        
        .user-location-marker {
            background-color: var(--text-blue);
            border: 3px solid var(--bg-gold);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(13, 71, 161, 0.5); }
            70% { box-shadow: 0 0 0 15px rgba(13, 71, 161, 0); }
            100% { box-shadow: 0 0 0 0 rgba(13, 71, 161, 0); }
        }
    </style>
</head>
<body>

    <header>
        <h1 class="logo-title">Park Fast. Park Free. Park LV.</h1>
    </header>

    <div class="main-container">
        <div class="map-wrapper">
            <button class="btn-locate" onclick="initRealTimeLocation()">📍 Pin My Location</button>
            <div class="map-panel">
                <div id="map"></div>
            </div>
        </div>

        <div class="control-panel">
            <div class="panel-header">Find Parking</div>
            <label>1. Your Location</label>
            <input type="text" id="start-loc" class="input-field" placeholder="Click 'Pin My Location'..." readonly />
            
            <label>2. Destination</label>
            <input type="text" id="dest-loc" class="input-field" value="The Cosmopolitan of Las Vegas" />

            <button class="btn-action" onclick="locateAndRoute()">Find Closest Free Spot</button>
            
            <div class="status-box">
                <div id="output-log">Awaiting location permission...</div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Zoom set to 16 for better text readability on roads
        let map = L.map('map').setView([36.1147, -115.1728], 16);
        
        // Using "Voyager" style for high-contrast clarity
        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap contributors &copy; CARTO',
            subdomains: 'abcd',
            maxZoom: 19
        }).addTo(map);

        let userMarker;
        const userIcon = L.divIcon({ className: 'user-location-marker', iconSize: [24, 24], iconAnchor: [12, 12] });
        const logger = document.getElementById('output-log');

        function initRealTimeLocation() {
            if (!navigator.geolocation) { logger.innerHTML = "❌ Geolocation unsupported."; return; }
            logger.innerHTML = "📡 Searching for location...";

            navigator.geolocation.watchPosition(
                (position) => {
                    const lat = position.coords.latitude;
                    const lng = position.coords.longitude;
                    logger.innerHTML = `✅ Tracking: ${lat.toFixed(4)}, ${lng.toFixed(4)}`;
                    document.getElementById('start-loc').value = `${lat.toFixed(4)}, ${lng.toFixed(4)}`;

                    if (userMarker) { map.removeLayer(userMarker); }
                    userMarker = L.marker([lat, lng], { icon: userIcon }).addTo(map);
                    
                    if (!window.hasCentered) { map.setView([lat, lng], 17); window.hasCentered = true; }
                },
                (error) => { logger.innerHTML = `❌ GPS Error: ${error.message}`; },
                { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 }
            );
        }

        function locateAndRoute() { alert("Routing logic active."); }
    </script>
</body>
</html>
